name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (for example 1.0.1)"
        required: true
        default: "1.0.0"
      version_code:
        description: "Version code integer (for example 101)"
        required: true
        default: "1"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      VITE_API_ORIGIN: ${{ secrets.VITE_API_ORIGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Validate secrets
        run: |
          [[ -n "${VITE_API_ORIGIN}" ]] || (echo "Missing VITE_API_ORIGIN" && exit 1)
          [[ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]] || (echo "Missing ANDROID_KEYSTORE_BASE64" && exit 1)
          [[ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]] || (echo "Missing ANDROID_KEYSTORE_PASSWORD" && exit 1)
          [[ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ]] || (echo "Missing ANDROID_KEY_ALIAS" && exit 1)
          [[ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]] || (echo "Missing ANDROID_KEY_PASSWORD" && exit 1)

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Generate Android project
        run: |
          if [[ ! -d android ]]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/keystore
          echo -n "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/keystore/release.jks

      - name: Update version
        run: |
          if [[ -f android/app/build.gradle ]]; then
            sed -i 's/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/' android/app/build.gradle
            sed -i 's/versionName "[^"]*"/versionName "${{ github.event.inputs.version_name }}"/' android/app/build.gradle
          fi

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            -Pandroid.useAndroidX=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-v${{ github.event.inputs.version_name }}
          files: android/app/release/app-release.apk
          body: |
            Android Release v${{ github.event.inputs.version_name }}
            Build: ${{ github.event.inputs.version_code }}
