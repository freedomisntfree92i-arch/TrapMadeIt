name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (for example 1.0.1)"
        required: true
        default: "1.0.0"
      version_code:
        description: "Version code integer (for example 101)"
        required: true
        default: "1"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "11"
      VITE_API_ORIGIN: ${{ secrets.VITE_API_ORIGIN }}
      VERSION_NAME: ${{ github.event.inputs.version_name }}
      VERSION_CODE: ${{ github.event.inputs.version_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Fail if required secrets are missing
        run: |
          [[ -n "${VITE_API_ORIGIN}" ]] || (echo "Missing secret VITE_API_ORIGIN" && exit 1)
          [[ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]] || (echo "Missing secret ANDROID_KEYSTORE_BASE64" && exit 1)
          [[ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]] || (echo "Missing secret ANDROID_KEYSTORE_PASSWORD" && exit 1)
          [[ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ]] || (echo "Missing secret ANDROID_KEY_ALIAS" && exit 1)
          [[ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]] || (echo "Missing secret ANDROID_KEY_PASSWORD" && exit 1)

      - name: Build web assets
        run: npm run build

      - name: Generate Android project if needed
        run: |
          if [[ ! -d android/app ]]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Decode and write keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/trapmadeit-release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/trapmadeit-release.jks" >> $GITHUB_ENV

      - name: Update version in build.gradle
        run: |
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          cd ..

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-v${{ env.VERSION_NAME }}
          files: android/app/release/app-release.apk
          body: |
            Android Release v${{ env.VERSION_NAME }} (build ${{ env.VERSION_CODE }})
            
            Download the APK from this release to share with your team.
